[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "W", "I", "UP", "B", "S"]
ignore = ["S101"]

[tool.ruff.per-file-ignores]
"tests/**" = ["S", "B"]

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--cov=src --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
omit = ["src/migrations/*"]

[tool.coverage.report]
omit = ["src/migrations/*"]
